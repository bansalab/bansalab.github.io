<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f1b2d 0%,#13233b 55%,#16294a 100%);color:#eaf1fb;position:relative}
  .bg{position:absolute;inset:0;opacity:.5}
  .wrap{position:relative;z-index:2;padding:74px 80px;height:100%;display:flex;flex-direction:column;justify-content:center}
  .eyebrow{font-size:22px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#7fb0ff}
  h1{font-family:'Fraunces',serif;font-size:78px;font-weight:600;color:#fff;margin:18px 0 8px;letter-spacing:-1px}
  .role{font-size:31px;color:#cfe0f7;font-weight:500}
  .badges{display:flex;gap:14px;margin-top:38px;flex-wrap:wrap}
  .b{font-size:21px;background:rgba(127,176,255,.14);border:1px solid rgba(127,176,255,.3);color:#bcd4f7;padding:9px 20px;border-radius:999px;font-weight:500}
  .url{position:absolute;bottom:46px;left:80px;font-size:23px;color:#9fb4d4;font-weight:600;z-index:2}
  .mark{position:absolute;top:64px;right:80px;z-index:2}
</style></head>
<body>
  <svg class="bg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
    <defs><radialGradient id="rg" cx="82%" cy="28%" r="60%"><stop offset="0" stop-color="#2a6cff" stop-opacity=".55"/><stop offset="1" stop-color="#2a6cff" stop-opacity="0"/></radialGradient></defs>
    <rect width="1200" height="630" fill="url(#rg)"/>
    <g stroke="#5b8cff" stroke-width="1.4" fill="none" opacity=".35">
      <circle cx="1000" cy="170" r="70"/><circle cx="1000" cy="170" r="140"/><circle cx="1000" cy="170" r="210"/><circle cx="1000" cy="170" r="280"/>
    </g>
  </svg>
  <svg class="mark" width="64" height="64" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="3.6" fill="#5b9bff"/><circle cx="20" cy="20" r="9" stroke="#5b9bff" stroke-width="1.6" opacity=".7"/><circle cx="20" cy="20" r="15" stroke="#5b9bff" stroke-width="1.4" opacity=".45"/><circle cx="20" cy="20" r="19" stroke="#5b9bff" stroke-width="1.2" opacity=".25"/>
  </svg>
  <div class="wrap">
    <div class="eyebrow">Antenna · mmWave · Metasurface Consultancy</div>
    <h1>Dr Aakash Bansal</h1>
    <div class="role">Applied Electromagnetics — Loughborough University, UK</div>
    <div class="badges">
      <span class="b">Beam-steering mmWave</span>
      <span class="b">Metasurfaces &amp; RIS</span>
      <span class="b">3D-printed lenses</span>
      <span class="b">Satellite / 6G</span>
    </div>
  </div>
  <div class="url">www.bansalab.me</div>
</body></html>
